$schema: 'https://moonrepo.dev/schemas/project.json'

tasks:
  start:
    description: 'Build all then run backend (jar) + frontend (preview) in parallel'
    deps:
      - 'backend:build'
      - 'frontend:build'
    options:
      runInCI: false

  start:backend:
    description: 'Run built backend JAR'
    command: 'java'
    args:
      - '-jar'
      - 'backend/target/interviewed-0.0.1-SNAPSHOT.jar'
    deps:
      - 'backend:build'

  start:frontend:
    description: 'Serve built frontend via vite preview'
    command: 'pnpm'
    args:
      - 'preview'
    options:
      cwd: 'frontend'
    deps:
      - 'frontend:build'