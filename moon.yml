$schema: 'https://moonrepo.dev/schemas/project.json'

tasks:
  start:
    description: 'Build all then run api (jar) + web (preview) in parallel'
    deps:
      - 'api:build'
      - 'web:build'
    options:
      runInCI: false

  start:api:
    description: 'Run built api JAR'
    command: 'java'
    args:
      - '-jar'
      - 'apps/api/target/interviewed-0.0.1-SNAPSHOT.jar'
    deps:
      - 'api:build'

  start:web:
    description: 'Serve built web via vite preview'
    command: 'pnpm'
    args:
      - 'preview'
    options:
      cwd: 'apps/web'
    deps:
      - 'web:build'
